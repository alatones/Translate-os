<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Queued untranslated strings</title>
    <style>
      body {
        max-width: 780px;
        margin: 0 auto;
        padding: 32px 24px 64px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #1f2937;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 6px;
      }
      p.lead {
        margin: 0 0 24px;
        color: #4b5563;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin: 0 0 20px;
      }
      button {
        padding: 7px 14px;
        font-size: 13px;
        border: 1px solid #d1d5db;
        background: #f9fafb;
        border-radius: 4px;
        cursor: pointer;
      }
      button.primary {
        background: #2563eb;
        color: #fff;
        border-color: #2563eb;
      }
      button:hover {
        filter: brightness(0.97);
      }
      .group {
        margin: 0 0 24px;
        padding: 12px 14px;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
      }
      .group h2 {
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin: 0 0 8px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 60px;
        gap: 12px;
        padding: 4px 0;
        font-size: 13px;
        border-top: 1px solid #f3f4f6;
      }
      .row:first-of-type {
        border-top: 0;
      }
      .row .count {
        color: #6b7280;
        text-align: right;
      }
      #status {
        margin: 0 0 16px;
        font-size: 12px;
        color: #6b7280;
        min-height: 16px;
      }
      .empty {
        padding: 40px 0;
        text-align: center;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <h1>Queued untranslated strings</h1>
    <p class="lead">
      These are the English strings this extension has seen on the OneSignal
      dashboard but couldn't translate. If "Help improve translations" is on
      in the popup, this list is sent once per day, then cleared.
    </p>

    <div class="toolbar">
      <button id="send-now" class="primary" type="button">Send now</button>
      <button id="clear" type="button">Clear queue</button>
    </div>

    <p id="status"></p>

    <div id="entries"></div>

    <script src="queue.js"></script>
  </body>
</html>
